<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物理AI知识库</title>
    <meta name="description" content="物理AI知识库 - 连接物理理论与人工智能">
    
    <!-- Docsify核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
    
    <!-- Mermaid支持（思维导图） -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({startOnLoad: true});</script>
    
    <!-- 数学公式支持 -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- 代码高亮主题 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
    
    <!-- 自定义样式 -->
    <style>
        :root {
            --base-font-size: 15px;
            --theme-color: #1a73e8;
            --sidebar-width: 300px;
            --sidebar-nav-pagelink-padding: 8px 16px;
        }
        
        /* 侧边栏样式调整 */
        .sidebar {
            background-color: #f8f9fa;
            border-right: 1px solid #e0e0e0;
        }
        
        /* 代码块样式 */
        .markdown-section pre {
            background-color: #f5f5f5;
            border-radius: 4px;
            padding: 1em;
        }
        
        /* 思维导图容器样式 */
        .mermaid {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 10px;
            margin: 20px 0;
        }
        
        /* 协作说明样式 */
        .collaboration-section {
            background-color: #e8f0fe;
            border: 1px solid #d2e3fc;
            border-radius: 4px;
            padding: 15px;
            margin: 20px 0;
        }
        
        .collaboration-section h3 {
            color: #1967d2;
            margin-top: 0;
        }
        
        /* 左栏物理思维样式 */
        .physics-sidebar {
            background-color: #f1f8e9;
            border: 1px solid #dcedc8;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .physics-sidebar h3 {
            color: #558b2f;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        window.$docsify = {
            // 基础配置
            name: '物理AI知识库',
            repo: 'https://github.com/你的用户名/physical-ai-wiki',
            coverpage: true,
            loadSidebar: true,
            loadNavbar: true,
            subMaxLevel: 3,
            maxLevel: 4,
            
            // 搜索配置
            search: {
                maxAge: 86400000, // 过期时间，单位毫秒
                paths: 'auto',
                placeholder: '搜索...',
                noData: '找不到结果',
                depth: 2
            },
            
            // Mermaid配置
            mermaidConfig: {
                theme: 'default',
                logLevel: 3,
                flowchart: {
                    htmlLabels: false,
                    curve: 'linear'
                }
            },
            
            // 数学公式配置
            math: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            
            // 侧边栏配置
            alias: {
                '/.*/_sidebar.md': '/_sidebar.md'
            },
            
            // 自定义Markdown渲染
            markdown: {
                renderer: {
                    // 在每个页面开头添加协作说明
                    render: function(html) {
                        return `
                            <div class="collaboration-section">
                                <h3>🤝 协作说明</h3>
                                <p>欢迎为物理AI知识库贡献内容！</p>
                                <ul>
                                    <li>📝 <strong>如何贡献：</strong> Fork仓库 → 创建新分支 → 提交Pull Request</li>
                                    <li>📋 <strong>审核流程：</strong> 所有修改需经过管理员审核后生效</li>
                                    <li>📚 <strong>贡献指南：</strong> 请遵循<a href="/contributing.md">贡献指南</a></li>
                                </ul>
                            </div>
                            ${html}
                        `;
                    }
                }
            }
        };
    </script>
</body>
</html>
