<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物理AI知识库</title>
  <!-- 主题样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #1a73e8; }
    .mermaid { background:#fff; border:1px solid #e0e0e0; border-radius:4px; padding:10px; margin:20px 0; }
  </style>
</head>
<body>
  <div id="app">正在加载...</div>

  <!-- ① 先定义配置 -->
  <script>
    window.$docsify = {
      name: '物理AI知识库',
      repo: 'https://github.com/Ge-Huo/physical-ai-wiki',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === "mermaid") {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            if (window.mermaid) {
              mermaid.run({ querySelector: '.mermaid' });
            }
          });
        }
      ]
    };
  </script>

  <!-- ② 再加载 Mermaid（关闭自动加载，交给插件钩子控制） -->
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: false });
    window.mermaid = mermaid;
  </script>

  <!-- ③ 最后加载 Docsify 核心（必须在配置之后） -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
